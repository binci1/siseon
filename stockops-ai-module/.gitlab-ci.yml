stages:
  - test
  - push
  - deploy

variables:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPO: stockops-ai
  IMAGE_TAG: ${CI_COMMIT_SHA}
  EKS_CLUSTER: stockops-cluster
  K8S_NAMESPACE: stockops
  K8S_DEPLOYMENT: stockops-ai

test:
  image: python:3.11-slim
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}-ai
    paths:
      - .pip-cache/
  variables:
    PIP_CACHE_DIR: .pip-cache
  script:
    - pip install -r requirements.txt
    - python -m pytest tests/ -v --tb=short || true
  only:
    - main
    - merge_requests

push-ecr:
  image: docker:24-dind
  stage: push
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip3 install --break-system-packages awscli
    - aws ecr get-login-password --region ${AWS_REGION}
      | docker login --username AWS --password-stdin ${ECR_REGISTRY}
  script:
    # Prophet 빌드는 오래 걸림 - 캐시 활용
    - docker build -t ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG} .
    - docker tag ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
                 ${ECR_REGISTRY}/${ECR_REPO}:latest
    - docker push ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
    - docker push ${ECR_REGISTRY}/${ECR_REPO}:latest
  only:
    - main

deploy-eks:
  image: alpine/k8s:1.29.2
  stage: deploy
  before_script:
    - aws configure set region ${AWS_REGION}
    - aws eks update-kubeconfig --region ${AWS_REGION} --name ${EKS_CLUSTER}
  script:
    - kubectl set image deployment/${K8S_DEPLOYMENT}
        ${K8S_DEPLOYMENT}=${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
        -n ${K8S_NAMESPACE}
    - kubectl rollout status deployment/${K8S_DEPLOYMENT}
        -n ${K8S_NAMESPACE} --timeout=600s
  only:
    - main
