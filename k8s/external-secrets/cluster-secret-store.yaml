# External Secrets Operator - ClusterSecretStore
# AWS Secrets Manager를 외부 시크릿 소스로 등록
# 전제: External Secrets Operator가 설치되어 있어야 함
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      # IRSA (IAM Roles for Service Accounts) 사용
      # EKS 노드 IAM Role에 SecretsManager:GetSecretValue 권한 부여 필요
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
