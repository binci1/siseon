# ExternalSecret: stockops/prod/api (AWS Secrets Manager) -> K8s Secret
# AWS Secrets Manager에 저장할 JSON 형식 예시:
# {
#   "DB_HOST": "stockops-db.xxxxxxxx.ap-northeast-2.rds.amazonaws.com",
#   "DB_USER": "stockops",
#   "DB_PASSWORD": "your_secure_password",
#   "JWT_SECRET": "your_256bit_jwt_secret_minimum_32_chars",
#   "SPRING_DATA_REDIS_HOST": "stockops-redis.xxxxxx.ng.0001.apn2.cache.amazonaws.com",
#   "SPRING_MAIL_HOST": "email-smtp.ap-northeast-2.amazonaws.com",
#   "SPRING_MAIL_USERNAME": "AKIAXXXXXXXXXXXXXXXX",
#   "SPRING_MAIL_PASSWORD": "your_ses_smtp_password"
# }
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stockops-api-secret
  namespace: stockops
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: stockops-api-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: stockops/prod/api
