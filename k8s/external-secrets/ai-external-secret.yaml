# ExternalSecret: stockops/prod/ai (AWS Secrets Manager) -> K8s Secret
# AWS Secrets Manager에 저장할 JSON 형식 예시:
# {
#   "DATABASE_URL": "postgresql://stockops:password@stockops-db.xxx.rds.amazonaws.com:5432/stockops",
#   "AI_MODULE_API_KEY": "your_ai_api_key"
# }
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stockops-ai-secret
  namespace: stockops
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: stockops-ai-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: stockops/prod/ai
