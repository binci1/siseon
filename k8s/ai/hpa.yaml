apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stockops-ai-hpa
  namespace: stockops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stockops-ai
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Prophet 학습 시 CPU 급증 - 임계값을 높게 설정
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 600
