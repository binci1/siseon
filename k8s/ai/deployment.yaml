apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockops-ai
  namespace: stockops
  labels:
    app: stockops-ai
    tier: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stockops-ai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: stockops-ai
        tier: ai
    spec:
      containers:
        - name: stockops-ai
          # ECR ?ґл?м§Ђ - setup-eks.sh ?¤н–‰ ???¤м њ к°’мњјлЎ?кµђмІґ ?ђлЉ” CI/CD?ђм„њ мЈјмћ…
          image: 135813463032.dkr.ecr.ap-northeast-2.amazonaws.com/stockops-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: stockops-ai-config
            - secretRef:
                name: stockops-ai-secret
          resources:
            requests:
              # Prophet ?™мЉµ?Ђ CPU м§‘м•Ѕ??- м¶©л¶„??CPU ? л‹№
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
