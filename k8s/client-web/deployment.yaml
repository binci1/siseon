apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockops-client-web
  namespace: stockops
  labels:
    app: stockops-client-web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stockops-client-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: stockops-client-web
        tier: frontend
    spec:
      containers:
        - name: stockops-client-web
          image: 135813463032.dkr.ecr.ap-northeast-2.amazonaws.com/stockops-client-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
