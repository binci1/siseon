apiVersion: apps/v1
kind: Deployment
metadata:
  name: stockops-api
  namespace: stockops
  labels:
    app: stockops-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stockops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: stockops-api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: stockops-api-sa
      containers:
        - name: stockops-api
          # ECR ?ґл?м§Ђ - setup-eks.sh ?¤н–‰ ???¤м њ к°’мњјлЎ?кµђмІґ ?ђлЉ” CI/CD?ђм„њ мЈјмћ…
          image: 135813463032.dkr.ecr.ap-northeast-2.amazonaws.com/stockops-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: stockops-api-config
            - secretRef:
                name: stockops-api-secret
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -XX:+UseG1GC"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
