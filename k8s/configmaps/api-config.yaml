apiVersion: v1
kind: ConfigMap
metadata:
  name: stockops-api-config
  namespace: stockops
data:
  # Spring
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  LOG_LEVEL: "INFO"

  # Database (non-secret)
  DB_PORT: "5432"
  DB_NAME: "stockops"

  # JWT (expiration only)
  JWT_EXPIRATION: "86400000"

  # Redis (non-secret)
  SPRING_DATA_REDIS_PORT: "6379"

  # Mail (non-secret)
  SPRING_MAIL_PORT: "587"
  SPRING_MAIL_DEFAULT_ENCODING: "UTF-8"

  # Flyway
  SPRING_FLYWAY_ENABLED: "true"

  # Actuator
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
  MANAGEMENT_ENDPOINTS_WEB_BASE_PATH: "/api/actuator"
  MANAGEMENT_HEALTH_REDIS_ENABLED: "false"

  # Feature flags
  STOCKOPS_MQTT_INGESTION_ENABLED: "false"
  STOCKOPS_ANALYTICS_ENABLED: "true"
  STOCKOPS_AI_ENABLED: "true"

  # AI module service URL (K8s internal DNS)
  STOCKOPS_AI_SERVICE_URL: "http://stockops-ai:8000"
