stages:
  - test
  - build
  - push
  - deploy

variables:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPO: stockops-admin-web
  IMAGE_TAG: ${CI_COMMIT_SHA}
  EKS_CLUSTER: stockops-cluster
  K8S_NAMESPACE: stockops
  K8S_DEPLOYMENT: stockops-admin-web

# ──────────────────────────────────────────────────────────
# 1. 린트/타입 체크
# ──────────────────────────────────────────────────────────
test:
  image: node:20-alpine
  stage: test
  cache:
    key: ${CI_COMMIT_REF_SLUG}-admin
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run type-check || true
    - npm run lint || true
  only:
    - main
    - merge_requests

# ──────────────────────────────────────────────────────────
# 2. 프론트엔드 빌드 검증
# ──────────────────────────────────────────────────────────
build:
  image: node:20-alpine
  stage: build
  cache:
    key: ${CI_COMMIT_REF_SLUG}-admin
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main
    - merge_requests

# ──────────────────────────────────────────────────────────
# 3. Docker 이미지 빌드 & ECR Push
# ──────────────────────────────────────────────────────────
push-ecr:
  image: docker:24-dind
  stage: push
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip3 install --break-system-packages awscli
    - aws ecr get-login-password --region ${AWS_REGION}
      | docker login --username AWS --password-stdin ${ECR_REGISTRY}
  script:
    - docker build -t ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG} .
    - docker tag ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
                 ${ECR_REGISTRY}/${ECR_REPO}:latest
    - docker push ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
    - docker push ${ECR_REGISTRY}/${ECR_REPO}:latest
  only:
    - main

# ──────────────────────────────────────────────────────────
# 4. EKS Rolling Update 배포
# ──────────────────────────────────────────────────────────
deploy-eks:
  image: alpine/k8s:1.29.2
  stage: deploy
  before_script:
    - aws configure set region ${AWS_REGION}
    - aws eks update-kubeconfig
        --region ${AWS_REGION}
        --name ${EKS_CLUSTER}
  script:
    - kubectl set image deployment/${K8S_DEPLOYMENT}
        ${K8S_DEPLOYMENT}=${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
        -n ${K8S_NAMESPACE}
    - kubectl rollout status deployment/${K8S_DEPLOYMENT}
        -n ${K8S_NAMESPACE}
        --timeout=300s
  environment:
    name: production
    url: https://$STOCKOPS_DOMAIN/admin
  only:
    - main
